services:
  db:
    image: mariadb:11
    container_name: divi5val_db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required — copy .env.example to .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - divi5val_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 12

  wordpress:
    image: wordpress:6.7-php8.3-apache
    container_name: divi5val_wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:-db:3306}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wpuser}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?WORDPRESS_DB_PASSWORD is required}
      WORDPRESS_TABLE_PREFIX: wp_
    ports:
      - "${WP_PORT:-8080}:80"
    volumes:
      - divi5val_wp:/var/www/html
      - ./divi:/divi-install:ro
      - ./wp-plugin:/var/www/html/wp-content/plugins/ai-editor-divi5:ro
      - ./src:/validator-src:ro

  wpcli:
    image: wordpress:cli-php8.3
    container_name: divi5val_wpcli
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    env_file: .env
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:-db:3306}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wpuser}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?WORDPRESS_DB_PASSWORD is required}
    volumes:
      - divi5val_wp:/var/www/html
      - ./divi:/divi-install:ro
      - ./scripts:/scripts:ro
      - ./fixtures:/fixtures
      - ./wp-plugin:/var/www/html/wp-content/plugins/ai-editor-divi5:ro
      - ./src:/validator-src:ro
    user: "33:33"
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  divi5val_db:
    name: divi5val_db
  divi5val_wp:
    name: divi5val_wp
